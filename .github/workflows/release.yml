name: Build HomeStart release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 20260722-1200)
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and validate packages
        run: ./scripts/build_package.sh "${{ steps.version.outputs.value }}"
      - name: Create GitHub release
        if: steps.version.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.value }}"
          name: "HomeStart ${{ steps.version.outputs.value }}"
          generate_release_notes: true
          files: |
            dist/homestart-installer-${{ steps.version.outputs.value }}.tar.gz
            dist/homestart-update-${{ steps.version.outputs.value }}.tar.gz
