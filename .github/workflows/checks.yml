name: Checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile app.py
      - run: ./scripts/build_package.sh ci
