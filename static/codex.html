<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex CLI Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="codex-page">
    <main class="codex-shell">
      <header class="codex-header">
        <div>
          <p class="eyebrow">Supported app</p>
          <h1>Codex CLI Chat</h1>
        </div>
        <a class="open" href="/">Dashboard</a>
      </header>

      <section class="codex-workspace">
        <aside class="codex-history-panel">
          <div class="codex-panel-head">
            <h2>Chats</h2>
            <div class="codex-panel-actions">
              <button id="codex-import-open" type="button">Import</button>
              <button id="codex-new" type="button">New</button>
            </div>
          </div>
          <div id="codex-history" class="codex-history"></div>
        </aside>

        <section class="codex-chat" aria-live="polite">
          <div class="codex-permissions">
            <label>
              Model
              <select id="codex-model">
                <option value="">CLI default</option>
                <option value="gpt-5.3-codex">GPT-5.3 Codex</option>
                <option value="gpt-5.4">GPT-5.4</option>
                <option value="gpt-5.4-mini">GPT-5.4 Mini</option>
                <option value="gpt-5.2">GPT-5.2</option>
              </select>
            </label>
            <label>
              Sandbox
              <select id="codex-sandbox">
                <option value="read-only">Read only</option>
                <option value="workspace-write">Workspace write</option>
                <option value="danger-full-access">Full access</option>
              </select>
            </label>
            <label>
              Action approval
              <select id="codex-approval">
                <option value="never">Automatic</option>
                <option value="on-request">Ask before risky actions</option>
                <option value="untrusted">Ask for untrusted actions</option>
                <option value="on-failure">Retry after failure</option>
              </select>
            </label>
          </div>
          <div id="codex-messages" class="codex-messages"></div>
          <form id="codex-form" class="codex-form">
            <label class="codex-input">
              <span>Message</span>
              <textarea id="codex-message" rows="3" autocomplete="off" placeholder="Ask Codex"></textarea>
            </label>
            <div class="codex-attachments">
              <label class="codex-file-button">
                Attach files
                <input id="codex-files" type="file" multiple />
              </label>
              <div id="codex-attachment-list" class="codex-attachment-list"></div>
            </div>
            <div class="codex-actions">
              <button id="codex-delete" type="button">Delete chat</button>
              <button id="codex-send" type="submit">Send</button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <dialog id="codex-import-dialog" class="codex-dialog">
      <form id="codex-import-form" method="dialog">
        <h2>Import chat</h2>
        <label class="codex-input">
          <span>Paste exported or copied history</span>
          <textarea id="codex-import-text" rows="12" placeholder="Paste the chat history here"></textarea>
        </label>
        <div class="codex-actions">
          <button id="codex-import-cancel" type="button">Cancel</button>
          <button type="submit">Import</button>
        </div>
      </form>
    </dialog>
    <script src="/codex.js"></script>
  </body>
</html>
